name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm trusted publishing (OIDC) — no token stored anywhere
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Verify tag matches package.json version
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          if [ "$pkg" != "$GITHUB_REF_NAME" ]; then
            echo "package.json is $pkg but tag is $GITHUB_REF_NAME" >&2
            exit 1
          fi
      - run: npm test
      - name: Update npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      - run: npm publish --access public
